<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RedKit | Pentest & Red Team Toolkit</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <meta name="description" content="RedKit — a client-side toolkit of encoders, payload libraries, recon helpers and calculators for pentest and red team engagements.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="rk-header">
    <button class="rk-hamburger" id="rkHamburger" aria-label="Menu">☰</button>
    <a href="#" class="rk-brand"><span class="accent">~/</span>redkit<span class="muted">.kac0</span></a>
    <nav class="rk-tabs" id="rkTabs">
        <button class="rk-tab" data-cat="recon">Recon</button>
        <button class="rk-tab" data-cat="crypto">Crypto</button>
        <button class="rk-tab" data-cat="payloads">Payloads</button>
        <button class="rk-tab" data-cat="reporting">Reporting</button>
    </nav>
    <div class="rk-header-right">
      <a href="https://marcoalfans.github.io/" class="rk-back">← portfolio</a>
      <button class="rk-icon-btn" id="rkTheme" aria-label="Toggle theme"><span id="rkThemeIcon">☀</span></button>
    </div>
  </header>
  <div class="app">
    <aside class="sidebar">
      <div class="rk-sidebar-search">
        <button class="rk-search-btn" id="rkSearchBtn" aria-label="Search tools">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <span class="sb-label">Search tools</span>
          <kbd>⌘K</kbd>
        </button>
      </div>
      <nav class="nav">
        <div class="nav-section" data-cat="recon">
          <div class="nav-title">Recon & OSINT</div>
          <button class="nav-item" data-tool="google-dork">Google Dork Generator</button>
          <button class="nav-item" data-tool="shodan-dork">Shodan Dork Generator</button>
          <button class="nav-item" data-tool="subdomain-finder">Subdomain Finder</button>
          <button class="nav-item" data-tool="js-analyzer">JS File Analyzer</button>
          <button class="nav-item" data-tool="header-analyzer">Security Header Analyzer</button>
          <button class="nav-item" data-tool="dns-lookup">DNS Lookup</button>
          <button class="nav-item" data-tool="url-parser">URL Parser</button>
          <button class="nav-item" data-tool="ip-info">IP / Domain Info</button>
        </div>
        <div class="nav-section" data-cat="crypto">
          <div class="nav-title">Encoding</div>
          <button class="nav-item" data-tool="base64">Base64 Encode/Decode</button>
          <button class="nav-item" data-tool="url-encode">URL Encode/Decode</button>
          <button class="nav-item" data-tool="html-encode">HTML Encode/Decode</button>
          <button class="nav-item" data-tool="hex">Hex Encode/Decode</button>
          <button class="nav-item" data-tool="base32">Base32 Encode/Decode</button>
          <button class="nav-item" data-tool="base58">Base58 Encode/Decode</button>
          <button class="nav-item" data-tool="base85">Base85 / ASCII85</button>
          <button class="nav-item" data-tool="binary">Binary Encode/Decode</button>
          <button class="nav-item" data-tool="morse">Morse Code</button>
        </div>
        <div class="nav-section" data-cat="crypto">
          <div class="nav-title">Hashing</div>
          <button class="nav-item" data-tool="hash">Hash Generator</button>
          <button class="nav-item" data-tool="hash-id">Hash Identifier</button>
          <button class="nav-item" data-tool="jwt">JWT Decoder / Editor</button>
          <button class="nav-item" data-tool="cipher">Classic Ciphers</button>
        </div>
        <div class="nav-section" data-cat="payloads">
          <div class="nav-title">Payloads & Web Exploitation</div>
          <button class="nav-item" data-tool="csrf-poc">CSRF PoC Generator</button>
          <button class="nav-item" data-tool="dos-gen">DoS Payload Generator</button>
          <button class="nav-item" data-tool="xss-payloads">XSS Payload Library</button>
          <button class="nav-item" data-tool="sqli-payloads">SQLi Payload Library</button>
          <button class="nav-item" data-tool="idor-helper">IDOR Helper & Patterns</button>
          <button class="nav-item" data-tool="csrf-bypass">CSRF Bypass Techniques</button>
          <button class="nav-item" data-tool="path-traversal">Path Traversal / LFI Helper</button>
          <button class="nav-item" data-tool="graphql-helper">GraphQL Helper</button>
          <button class="nav-item" data-tool="ssrf-helper">SSRF Helper</button>
        </div>
        <div class="nav-section" data-cat="reporting">
          <div class="nav-title">Reporting</div>
          <button class="nav-item" data-tool="cvss31">CVSS 3.1 Calculator</button>
          <button class="nav-item" data-tool="cvss40">CVSS 4.0 Calculator</button>
          <button class="nav-item" data-tool="report-template">Report Template</button>
          <button class="nav-item" data-tool="notationer">Notationer</button>
        </div>
      </nav>
    </aside>
    <main class="main">
      <div class="topbar">
        <div class="topbar-title">
          <h2 id="currentToolTitle">RedKit</h2>
          <p id="currentToolDesc">Pentest & Red Team Toolkit</p>
        </div>
      </div>
      <div class="content" id="content"></div>
      <footer class="rk-footer">
        <span class="muted">Connection closed by foreign host.</span>
        <span>© 2026 Marco Alfan · RedKit</span>
      </footer>
    </main>
  </div>

  <div class="rk-search-modal" id="rkSearchModal" role="dialog" aria-modal="true">
    <div class="rk-search-box">
      <div class="rk-search-input-wrap">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input class="rk-search-input" id="rkSearchInput" placeholder="Search tools…" autocomplete="off">
        <kbd>esc</kbd>
      </div>
      <div class="rk-search-results" id="rkSearchResults"></div>
    </div>
  </div>

  <script src="cvss_tips.js"></script>
  <script src="cvss4.js"></script>
  <script src="app.js"></script>
  <script>
    (function () {
      const tabs = Array.from(document.querySelectorAll('.rk-tab'));
      const sections = Array.from(document.querySelectorAll('.nav-section[data-cat]'));
      const items = Array.from(document.querySelectorAll('.nav-item[data-tool]'));
      const sidebar = document.querySelector('.sidebar');
      const content = document.getElementById('content');
      const titleEl = document.getElementById('currentToolTitle');
      const descEl = document.getElementById('currentToolDesc');

      function show(cat) {
        sections.forEach(s => { s.style.display = s.dataset.cat === cat ? '' : 'none'; });
        tabs.forEach(t => t.classList.toggle('active', t.dataset.cat === cat));
      }
      function syncCat() {
        const active = document.querySelector('.nav-item.active');
        const sec = active && active.closest('.nav-section[data-cat]');
        if (sec) show(sec.dataset.cat);
      }

      // ----- landing / home -----
      function homeHTML() {
        const cards = tabs.map(t => {
          const cat = t.dataset.cat;
          const label = t.textContent.trim();
          const n = sections.filter(s => s.dataset.cat === cat).reduce((a, s) => a + s.querySelectorAll('.nav-item').length, 0);
          return '<button class="welcome-item" data-go="' + cat + '"><div class="welcome-info"><h3>' + label + '</h3><p>' + n + ' tools</p></div></button>';
        }).join('');
        return '<div class="welcome"><div class="welcome-card"><h1>RedKit</h1><p>Pentest &amp; Red Team Toolkit — pick a category to get started.</p><div class="welcome-grid">' + cards + '</div></div></div>';
      }
      function showHome() {
        items.forEach(n => n.classList.remove('active'));
        tabs.forEach(t => t.classList.remove('active'));
        sections.forEach(s => { s.style.display = 'none'; });
        if (titleEl) titleEl.textContent = 'RedKit';
        if (descEl) descEl.textContent = 'Pentest & Red Team Toolkit';
        if (content) {
          content.innerHTML = homeHTML();
          content.querySelectorAll('[data-go]').forEach(el => el.addEventListener('click', () => {
            const tab = tabs.find(t => t.dataset.cat === el.dataset.go);
            if (tab) tab.click();
          }));
        }
      }

      // ----- category tabs -----
      tabs.forEach(t => t.addEventListener('click', () => {
        const sec = sections.find(s => s.dataset.cat === t.dataset.cat);
        const first = sec && sec.querySelector('.nav-item');
        if (first) first.click(); else show(t.dataset.cat);
        if (sidebar) sidebar.classList.remove('open');
      }));

      // ----- deep-link routing (#/<tool>) -----
      items.forEach(it => it.addEventListener('click', () => {
        const key = it.dataset.tool;
        const want = '#/' + key;
        if (location.hash !== want && !location.hash.startsWith(want + '/')) location.hash = want;
        setTimeout(syncCat, 0);
      }));
      function hashKey() { const m = location.hash.match(/^#\/([\w-]+)/); return m ? m[1] : null; }
      function route() {
        const key = hashKey();
        if (!key) return false;
        const target = document.querySelector('.nav-item[data-tool="' + key + '"]');
        if (!target) return false;
        const active = document.querySelector('.nav-item.active');
        const hasSub = location.hash.startsWith('#/' + key + '/');
        if (!active || active.dataset.tool !== key || hasSub) target.click(); else syncCat();
        return true;
      }
      window.addEventListener('hashchange', () => { if (!route()) showHome(); });

      // ----- theme toggle -----
      const root = document.documentElement;
      const tbtn = document.getElementById('rkTheme');
      const ticon = document.getElementById('rkThemeIcon');
      function applyTheme(t) { root.setAttribute('data-theme', t); if (ticon) ticon.textContent = t === 'dark' ? '☀' : '☾'; }
      applyTheme(localStorage.getItem('theme') || 'dark');
      if (tbtn) tbtn.addEventListener('click', () => {
        const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        localStorage.setItem('theme', next); applyTheme(next);
      });

      const ham = document.getElementById('rkHamburger');
      if (ham) ham.addEventListener('click', () => sidebar && sidebar.classList.toggle('open'));

      // floating tooltips (CVSS metric/option descriptions)
      const tipEl = document.createElement('div');
      tipEl.className = 'rk-tip';
      document.body.appendChild(tipEl);
      const showTip = (el) => {
        const txt = el.getAttribute('data-tip');
        if (!txt) return;
        tipEl.textContent = txt;
        tipEl.style.display = 'block';
        const r = el.getBoundingClientRect();
        const tw = tipEl.offsetWidth, th = tipEl.offsetHeight;
        let left = r.left + r.width / 2 - tw / 2;
        left = Math.max(8, Math.min(left, window.innerWidth - tw - 8));
        let top = r.top - th - 10;
        if (top < 8) top = r.bottom + 10;
        tipEl.style.left = left + 'px';
        tipEl.style.top = top + 'px';
      };
      const hideTip = () => { tipEl.style.display = 'none'; };
      document.addEventListener('mouseover', (e) => { const el = e.target.closest('[data-tip]'); if (el && el.getAttribute('data-tip')) showTip(el); });
      document.addEventListener('mouseout', (e) => { if (e.target.closest('[data-tip]')) hideTip(); });

      // ----- search (Cmd/Ctrl + K) -----
      const INDEX = items.map(it => ({ key: it.dataset.tool, title: it.textContent.trim(), cat: it.closest('.nav-section').querySelector('.nav-title').textContent }));
      const modal = document.getElementById('rkSearchModal');
      const input = document.getElementById('rkSearchInput');
      const results = document.getElementById('rkSearchResults');
      let cur = [], sel = 0;
      function draw(q) {
        q = q.trim().toLowerCase();
        cur = q ? INDEX.filter(t => t.title.toLowerCase().includes(q) || t.cat.toLowerCase().includes(q) || t.key.includes(q)) : INDEX;
        sel = 0;
        if (!cur.length) { results.innerHTML = '<div class="rk-search-empty">No tools found.</div>'; return; }
        results.innerHTML = cur.map((t, i) => '<div class="rk-result' + (i === 0 ? ' sel' : '') + '" data-i="' + i + '"><span class="rk-result-title">' + t.title + '</span><span class="rk-result-cat">' + t.cat + '</span></div>').join('');
        results.querySelectorAll('.rk-result').forEach(el => {
          const i = +el.dataset.i;
          el.addEventListener('click', () => choose(i));
          el.addEventListener('mousemove', () => setSel(i));
        });
      }
      function setSel(i) { sel = i; results.querySelectorAll('.rk-result').forEach((el, j) => el.classList.toggle('sel', j === i)); const s = results.querySelector('.rk-result.sel'); if (s) s.scrollIntoView({ block: 'nearest' }); }
      function choose(i) { const t = cur[i]; if (!t) return; closeSearch(); location.hash = '#/' + t.key; }
      function openSearch() { modal.classList.add('open'); input.value = ''; draw(''); setTimeout(() => input.focus(), 0); }
      function closeSearch() { modal.classList.remove('open'); }
      const sbtn = document.getElementById('rkSearchBtn');
      if (sbtn) sbtn.addEventListener('click', openSearch);
      if (modal) modal.addEventListener('click', e => { if (e.target === modal) closeSearch(); });
      if (input) {
        input.addEventListener('input', () => draw(input.value));
        input.addEventListener('keydown', e => {
          if (e.key === 'ArrowDown') { e.preventDefault(); setSel(Math.min(sel + 1, cur.length - 1)); }
          else if (e.key === 'ArrowUp') { e.preventDefault(); setSel(Math.max(sel - 1, 0)); }
          else if (e.key === 'Enter') { e.preventDefault(); choose(sel); }
        });
      }
      document.addEventListener('keydown', e => {
        if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); modal.classList.contains('open') ? closeSearch() : openSearch(); }
        else if (e.key === 'Escape' && modal.classList.contains('open')) closeSearch();
      });

      // ----- init (root shows landing, not a tool) -----
      function init() { if (!route()) showHome(); }
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', () => setTimeout(init, 0));
      else setTimeout(init, 0);
    })();
  </script>
</body>
</html>
